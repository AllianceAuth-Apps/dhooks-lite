stages:
  - checks
  - test
  - deploy

pre-commit-check:
  stage: checks
  image: python:3.10-bullseye
  variables:
    PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
  cache:
    paths:
      - ${PRE_COMMIT_HOME}
  script:
    - pip install pre-commit
    - pre-commit run --all-files

test-py36:
  stage: test
  image: python:3.6-bullseye
  before_script:
    - pip install tox
  script:
    - tox -e py36

test-py37:
  stage: test
  image: python:3.7-bullseye
  before_script:
    - pip install tox
  script:
    - tox -e py37

test-py38:
  stage: test
  image: python:3.8-bullseye
  before_script:
    - pip install tox
  script:
    - tox -e py38

test-py39:
  stage: test
  image: python:3.9-bullseye
  before_script:
    - pip install tox
  script:
    - tox -e py39

test-py310:
  stage: test
  image: python:3.10-bullseye
  before_script:
    - pip install tox
  script:
    - tox -e py310
    - bash <(curl -s https://codecov.io/bash)

deploy-pypi:
  stage: deploy
  image: python:3.10-bullseye

  before_script:
    - pip install twine

  script:
    - python setup.py sdist bdist_wheel
    - twine upload dist/*

  only:
    - tags
