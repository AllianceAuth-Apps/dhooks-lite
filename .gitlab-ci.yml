test-py310:
  stage: test
  image: python:3.10-bullseye
  before_script:
    - pip install tox

  script:
    - tox -e py310
    - bash <(curl -s https://codecov.io/bash)

deploy-pypi:
  stage: deploy
  image: python:3.10-bullseye

  before_script:
    - pip install twine

  script:
    - python setup.py sdist bdist_wheel
    - twine upload dist/*

  only:
    - tags
